services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: apiary
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: hub
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apiary"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - metabase-demo-pgdata:/var/lib/postgresql/data
      - ./seed:/seed:ro
      - ./init-db:/docker-entrypoint-initdb.d:ro

  metabase:
    image: metabase/metabase:latest
    hostname: metabase-demo
    ports:
      - "3030:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      MB_ANON_TRACKING_ENABLED: "false"
      MB_LOAD_SAMPLE_CONTENT: "false"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./seed:/metabase-data

volumes:
  metabase-demo-pgdata:

